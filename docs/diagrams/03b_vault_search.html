<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>UI flow — vault search</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #f1f5f9; font-family: sans-serif; }

  body { display: flex; align-items: center; justify-content: center; }
  #diagram {
    border: 1px solid #cbd5e1;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    background: #ffffff;
    overflow: hidden;
    position: relative;
  }

</style>

<body>
<div id="diagram"></div>
<script src="https://viewer.diagrams.net/js/viewer-static.min.js"></script>
<script>

function fitGraph(viewer, container) {
  if (!viewer || !viewer.graph) return;
  var graph = viewer.graph;
  graph.view.setScale(1);
  graph.view.setTranslate(0, 0);
  var bounds = graph.getGraphBounds();
  if (!bounds || bounds.width <= 0 || bounds.height <= 0) return;
  var pad = 30;
  var availW = container.clientWidth - pad * 2;
  var availH = container.clientHeight - pad * 2;
  var scale = Math.min(availW / bounds.width, availH / bounds.height);
  if (scale > 4) scale = 4;
  if (scale < 0.1) scale = 0.1;
  graph.view.setScale(scale);
  var b2 = graph.getGraphBounds();
  var tx = (container.clientWidth - b2.width) / 2 - b2.x;
  var ty = (container.clientHeight - b2.height) / 2 - b2.y;
  graph.view.setTranslate(tx / scale, ty / scale);
}

var config = {"nav": true, "resize": false, "toolbar": "zoom layers lightbox", "fit": true, "page": false};
var container = document.getElementById('diagram');
function setSize() {
  container.style.width  = Math.round(window.innerWidth  * 0.85) + 'px';
  container.style.height = Math.round(window.innerHeight * 0.85) + 'px';
}
setSize();
if (typeof GraphViewer === 'undefined' || typeof mxUtils === 'undefined') {
  container.innerHTML = '<div style="padding:32px;font-family:sans-serif;color:#7f1d1d;">' +
    '<strong>draw.io viewer not loaded.</strong></div>';
} else {
  var xmlDoc = mxUtils.parseXml(xmlStr);
  var viewer = new GraphViewer(container, xmlDoc.documentElement, config);
  setTimeout(function() { fitGraph(viewer, container); }, 50);
  window.addEventListener('resize', function() {
    setSize();
    fitGraph(viewer, container);
  });
}
</script>
</body>
